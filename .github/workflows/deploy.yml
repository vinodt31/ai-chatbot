name: Deploy Lambda Code Pipeline

on:
  push:
    branches:
      - main  

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Using v5 to natively support latest Node versions without warnings
    - name: Checkout Repository Code
      uses: actions/checkout@v5

    # Step 2: Set up Node.js 22 environment to compile your dependencies
    - name: Set up Node.js Runtime
      uses: actions/setup-node@v5
      with:
        node-version: '22.x' # Tailored to match your active AWS Lambda runtime

    # Step 3: Install only production dependencies
    - name: Install Production Node Modules
      run: npm install --production

    # Step 4: Compress your code files into a single zip file
    - name: Package Application Files
      run: zip -r function.zip index.js package.json node_modules

    # Step 5: Using v5 to natively support AWS execution on modern nodes
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v5
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    # Step 6: Upload the heavy zip file to S3 (Bypasses 50MB direct limit)
    - name: Upload to S3
      run: |
        aws s3 cp function.zip s3://vinod-chatbot-pipeline-bucket/function.zip

    # Step 7: Update Lambda code pointing directly to the S3 object
    - name: Push Zip from S3 to AWS Lambda
      run: |
        aws lambda update-function-code \
          --function-name ai-chatbot \
          --s3-bucket vinod-chatbot-pipeline-bucket \
          --s3-key function.zip