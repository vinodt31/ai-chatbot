name: Deploy Lambda Code Pipeline

on:
  push:
    branches:
      - main  

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Updated to latest checkout action
    - name: Checkout Repository Code
      uses: actions/checkout@v4.2.2 

    # Step 2: Set up the correct Node.js runtime environment for your project files
    - name: Set up Node.js Runtime
      uses: actions/setup-node@v4.2.0
      with:
        node-version: '20.x' # Keep this as 20.x to match your AWS Lambda runtime

    # Step 3: Install only production dependencies
    - name: Install Production Node Modules
      run: npm install --production

    # Step 4: Compress index.js, package.json, and node_modules into a single zip file
    - name: Package Application Files
      run: zip -r function.zip index.js package.json node_modules

    # Step 5: Updated to latest AWS credentials action
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4.1.0
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    # Step 6: Upload the heavy zip file to S3 first (Bypasses 50MB direct limit)
    - name: Upload to S3
      run: |
        aws s3 cp function.zip s3://vinod-chatbot-pipeline-bucket/function.zip

    # Step 7: Update Lambda code pointing directly to the S3 object
    - name: Push Zip from S3 to AWS Lambda
      run: |
        aws lambda update-function-code \
          --function-name chat-boat-lambda \
          --s3-bucket vinod-chatbot-pipeline-bucket \
          --s3-key function.zip
